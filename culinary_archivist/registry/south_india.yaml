description: Semiya Payasam is a beloved South Indian sweet pudding with deep roots
  in Kerala cuisine, particularly associated with festive occasions like Onam. The
  dish reflects the region's abundant use of clarified butter (ghee), milk-based desserts,
  and the influence of cardamom and dried fruit garnishes. It remains a staple in
  Sadya (traditional Kerala feast) and modern celebrations.
