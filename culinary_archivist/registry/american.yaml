cooking_techniques:
  - Griddle cooking (pancakes, French toast, hash browns)
  - Stovetop scrambling / poaching / frying eggs
  - Overnight oats (no-cook cold soak)
  - Slow smoking (BBQ — indirect low heat, wood chips)
  - Deep frying (Southern fried chicken, doughnuts, hush puppies)
  - Baking in 9x13 casserole or Bundt pan
  - Creaming butter and sugar (cookie and cake base)
  - Blind baking pie shells
  - Braising / pot roast (Dutch oven, low and slow)
  - Grilling over charcoal or gas (burgers, ribs, corn)
  - Casserole baking (green bean casserole, tuna noodle casserole)
  - Sheet pan cooking
  - Steaming / boiling seafood (New England clam bake, Low Country boil)

archaic_terms:
  shortening: hydrogenated vegetable fat (Crisco) — baking workhorse pre-1980s
  lard: rendered pig fat — traditional Southern pie crust and frying fat
  oleo / margarine: butter substitute — Depression and WWII-era recipes
  scant: just under a full measure ("scant teaspoon")
  heaping: generously overfilled measure ("heaping tablespoon")
  fold: gently incorporate without deflating (soufflé, cake batter)
  soft peaks / stiff peaks: whipped cream or meringue stages
  cream together: beat butter and sugar until pale and fluffy
  double boiler: bowl over simmering water (chocolate melting, custards)
  blanch: briefly boil then ice-bath (vegetables — preserves color)
  coddle: very gentle simmer just below boiling (eggs)
  graham crackers: honey-wheat crackers — key cheesecake / s'mores ingredient
  file powder: ground sassafras leaf — Cajun gumbo thickener and flavour
  roux: cooked fat-flour base — white, blonde, or dark (Cajun dark roux is 40 min stirring)

