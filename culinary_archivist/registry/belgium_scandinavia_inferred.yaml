description: 'This recipe combines two European culinary traditions: Belgian endive,
  developed in Belgium in the 1850s and celebrated as ''white gold,'' with smoked
  salmon, a Scandinavian preservation and delicacy tradition. The endive boat format
  emerged as a modern elegant appetizer, likely in mid-20th century fine dining contexts,
  representing the post-war embrace of refined cold hors d''oeuvres.'
